name: Auto-approve Renovate PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  approve:
    runs-on: ubuntu-latest
    # Only run this job if the PR author is the Renovate bot
    if: github.actor == 'renovate[bot]'
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_AUTO_APPROVER_AMZ_AWS_CLI }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve -b "Auto-approved by repository owner to allow Renovate auto-merge"
